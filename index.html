<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
		<meta name="apple-mobile-web-app-capable" content="true" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<title>Deck Builder Game</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link rel="stylesheet" href="./assets/css/styles.css" />
	</head>
	<body>
		<div class="game-container">
			<!-- Header -->
			<header class="game-header">
				<div class="header-content">
					<h1 class="game-title">⚔️ Card Showdown</h1>
					<p class="game-subtitle">Test your strategy and defeat your opponent</p>
				</div>
                <div class="d-flex justify-content-center flex-wrap gap-2 mt-3">
                    <button id="start-btn" class="btn btn-success btn-action btn-start-game justify-content-center" onclick="startGame()">
						<span>Start Game</span>
						<span class="btn-icon">⚔️</span>
					</button>
                </div>
			</header>

			<!-- Main Game Area -->
			<main class="game-board">
				<!-- Enemy Section -->
				<section class="player-section enemy-section">
					<div class="player-info">
						<h2 class="player-label">Enemy</h2>
						<div class="health-container">
							<div class="health-bar-bg">
								<div id="enemy-health-bar" class="health-bar"></div>
							</div>
							<div class="health-text">
								<span id="enemy-health" class="health-value">100</span>
								<span class="health-label">/  100</span>
							</div>
						</div>
						<div class="player-avatar enemy-avatar">🤖</div>
					</div>

					<!-- Status Effects Section -->
					<div class="status-effects-section">
						<div class="status-effects-header">
							<span class="status-label">Status Effects</span>
						</div>
						<div id="enemy-status-effects" class="status-effects-container"></div>
					</div>

					<!-- Enemy Hand Section -->
					<div class="hand-section enemy-hand-section">
						<div class="hand-header">
							<h3 class="hand-title">Enemy Hand</h3>
							<span class="card-count"><span id="enemy-card-count">0</span> Cards</span>
						</div>
						<div id="enemy-cards" class="cards-container enemy-cards"></div>
					</div>
				</section>

				<!-- Battle Arena -->
				<section class="battle-arena">
					<div class="arena-divider"></div>
					<div class="arena-info">
						<div class="round-counter">
							<span class="round-label">Round</span>
							<span id="round-number" class="round-value">1</span>
						</div>
						<p class="turn-indicator">Your Turn</p>
						<div id="action-log" class="action-log"></div>
					</div>
					<div class="arena-divider"></div>
                    
					<!-- Action Buttons -->
					<div class="action-buttons d-flex flex-column flex-md-row gap-2">
						<button id="end-turn-btn" class="btn btn-primary btn-action btn-end-turn" onclick="endTurn()" style="display: none;">
							<span>End Turn</span>
							<span class="btn-icon">→</span>
						</button>
					</div>
				</section>

				<!-- Player Section -->
				<section class="player-section player-section-main">
					<div class="player-info">
						<h2 class="player-label">You</h2>
						<div class="health-container">
							<div class="health-bar-bg">
								<div id="player-health-bar" class="health-bar player-health"></div>
							</div>
							<div class="health-text">
								<span id="player-health" class="health-value">100</span>
								<span class="health-label">/  100</span>
							</div>
						</div>
						<div class="player-avatar player-avatar-main">👤</div>
					</div>

					<!-- Status Effects Section -->
					<div class="status-effects-section">
						<div class="status-effects-header">
							<span class="status-label">Status Effects</span>
						</div>
						<div id="player-status-effects" class="status-effects-container"></div>
					</div>

					<!-- Hand Section -->
					<div class="hand-section">
						<div class="hand-header">
							<h3 class="hand-title">Your Hand</h3>
							<span class="card-count"><span id="card-count">0</span> Cards</span>
						</div>
						<div id="cards" class="cards-container"></div>
					</div>
				</section>
			</main>
		</div>

		<script src="./assets/js/script.js"></script>
		<script src="./assets/js/enemy.js"></script>
		<script src="./assets/js/player.js"></script>
	</body>
</html>


<!-- This is a simple deck-building game where the player and enemy take turns attacking each other. The player can play cards from their hand to deal damage to the enemy, and the enemy will attack back at the end of the player's turn. The game continues until either the player or the enemy's health reaches zero. -->
