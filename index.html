<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Deck Builder Game</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link rel="stylesheet" href="/assets/css/styles.css" />
	</head>
	<body>
		<div class="game-container">
			<!-- Header -->
			<header class="game-header">
				<div class="header-content">
					<h1 class="game-title">⚔️ Card Showdown</h1>
					<p class="game-subtitle">Test your strategy and defeat your opponent</p>
				</div>
			</header>

			<!-- Main Game Area -->
			<main class="game-board">
				<!-- Enemy Section -->
				<section class="player-section enemy-section">
					<div class="player-info">
						<h2 class="player-label">Enemy</h2>
						<div class="health-container">
							<div class="health-bar-bg">
								<div id="enemy-health-bar" class="health-bar"></div>
							</div>
							<div class="health-text">
								<span id="enemy-health" class="health-value">20</span>
								<span class="health-label">/ 20</span>
							</div>
						</div>
						<div class="player-avatar enemy-avatar">🤖</div>
					</div>
				</section>

				<!-- Battle Arena -->
				<section class="battle-arena">
					<div class="arena-divider"></div>
					<div class="arena-info">
						<div class="round-counter">
							<span class="round-label">Round</span>
							<span id="round-number" class="round-value">1</span>
						</div>
						<p class="turn-indicator">Your Turn</p>
					</div>
					<div class="arena-divider"></div>
				</section>

				<!-- Player Section -->
				<section class="player-section player-section-main">
					<div class="player-info">
						<h2 class="player-label">You</h2>
						<div class="health-container">
							<div class="health-bar-bg">
								<div id="player-health-bar" class="health-bar player-health"></div>
							</div>
							<div class="health-text">
								<span id="player-health" class="health-value">20</span>
								<span class="health-label">/ 20</span>
							</div>
						</div>
						<div class="player-avatar player-avatar-main">👤</div>
					</div>

					<!-- Hand Section -->
					<div class="hand-section">
						<div class="hand-header">
							<h3 class="hand-title">Your Hand</h3>
							<span class="card-count"><span id="card-count">0</span> Cards</span>
						</div>
						<div id="cards" class="cards-container"></div>
					</div>

					<!-- Action Buttons -->
					<div class="action-buttons">
						<button class="btn btn-primary btn-action btn-end-turn" onclick="endTurn()">
							<span>End Turn</span>
							<span class="btn-icon">→</span>
						</button>
					</div>
				</section>
			</main>
		</div>

		<script src="/assets/js/script.js"></script>
	</body>
</html>


<!-- This is a simple deck-building game where the player and enemy take turns attacking each other. The player can play cards from their hand to deal damage to the enemy, and the enemy will attack back at the end of the player's turn. The game continues until either the player or the enemy's health reaches zero. -->
